<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shift Handover Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; color: #c9d1d9; font-family: 'Courier New', monospace; }
  .topbar { background: #0d1117; border-bottom: 1px solid #1f2937; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
  .logo { color: #00b4d8; font-size: 13px; font-weight: bold; letter-spacing: 2px; }
  .back { color: #6b7280; font-size: 12px; text-decoration: none; }
  .back:hover { color: #00b4d8; }
  .container { padding: 24px; max-width: 860px; margin: 0 auto; }
  .report-box { background: #0d1117; border: 1px solid #1f2937; border-radius: 8px; padding: 24px; }
  .report-title { font-size: 11px; color: #6b7280; letter-spacing: 2px; margin-bottom: 16px; }
  pre { font-family: 'Courier New', monospace; font-size: 12px; color: #9ca3af; white-space: pre-wrap; line-height: 1.8; }
  pre .highlight { color: #00b4d8; }
  .actions { display: flex; gap: 12px; margin-top: 20px; }
  .btn { padding: 10px 20px; border-radius: 6px; border: none; font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; cursor: pointer; letter-spacing: 1px; text-decoration: none; display: inline-block; }
  .btn-download { background: #00b4d8; color: #0a0e1a; }
  .btn-download:hover { background: #0284c7; }
  .btn-back { background: #0d1117; color: #6b7280; border: 1px solid #1f2937; }
  .btn-back:hover { color: #00b4d8; border-color: #00b4d8; }
  .btn-print { background: #0d1117; color: #22c55e; border: 1px solid #22c55e; }
  .btn-print:hover { background: #052e16; }
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">⬡ ONE NZ CDC — SHIFT HANDOVER REPORT</div>
  <a href="/" class="back">← BACK TO DASHBOARD</a>
</div>

<div class="container">
  <div class="report-box">
    <div class="report-title">▸ GENERATED HANDOVER REPORT — {{ analyst }}</div>
    <pre>{{ report }}</pre>
  </div>

  <div class="actions">
    <a href="/handover/download" class="btn btn-download">⬇ DOWNLOAD .TXT</a>
    <button class="btn btn-print" onclick="window.print()">⎙ PRINT REPORT</button>
    <a href="/" class="btn btn-back">← BACK TO DASHBOARD</a>
  </div>
</div>
</body>
</html>
